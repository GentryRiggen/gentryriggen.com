name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Static checks + unit tests ──
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 💅 Format check
        run: npm run format:check

      - name: 🔷 Type check
        run: npm run type-check

      - name: 🧪 Unit tests
        run: npm test

  # ── Browser tests (runs in parallel with validate) ──
  e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 💾 Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 🌐 Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🎬 Run E2E tests
        run: npm run test:e2e

  # ── Production build (waits for validate + e2e) ──
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    needs: [validate, e2e]
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: out
          retention-days: 1

  # ── Deploy (main branch only) ──
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build
          path: out

      - name: 🔥 Validate Firebase config
        run: |
          if grep -q "your-firebase-project-id\|placeholder\|example" .firebaserc; then
            echo "::error::.firebaserc contains placeholder values. Set a valid Firebase project ID."
            exit 1
          fi

      - name: 🚀 Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: "${{ secrets.FIREBASE_PROJECT_ID }}"
